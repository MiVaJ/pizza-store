[tool.ruff]
line-length = 88
target-version = "py311"
[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["F401", "I001"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C90"]
ignore = ["B008"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
mypy_path = "."
explicit_package_bases = true
disable_error_code = ["import-untyped"]
namespace_packages = true


[[tool.mypy.overrides]]
module = "sentry_sdk"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "sentry_sdk.*"
ignore_missing_imports = true
